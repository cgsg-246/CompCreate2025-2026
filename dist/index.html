<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PC Builder AI</title>
    <link rel="stylesheet" href="styles.css">
    <div id="auth-buttons">
        <button id="login-btn" class="auth-btn">Войти</button>
        <button id="register-btn" class="auth-btn">Регистрация</button>
        <button id="logout-btn" class="auth-btn" style="display:none;">Выйти</button>
    </div>
    <div id="login-modal" style="display:none;">
        <h2>Вход</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Пароль">
        <button id="login-submit">Войти</button>
        <button id="login-close">Закрыть</button>
    </div>

    <div id="register-modal" style="display:none;">
        <h2>Регистрация</h2>
        <input type="email" id="register-email" placeholder="Email">
        <input type="password" id="register-password" placeholder="Пароль">
        <button id="register-submit">Зарегистрироваться</button>
        <button id="register-close">Закрыть</button>
    </div>
    <div id="login-modal" style="display:none;">
        <div class="modal-overlay">
            <div class="modal-content">
                <span id="login-close" class="modal-close">&times;</span>
                <h2>Вход</h2>
                <input type="email" id="login-email" placeholder="Email" autocomplete="email">
                <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password">
                <button id="login-submit">Войти</button>
                <div id="login-message" style="color: var(--accent-pink); margin-top: 10px;"></div>
            </div>
        </div>
    </div>
</head>

<body>
    <div id="app">
        <aside id="sidebar-left">
            <h2>Компоненты</h2>
            <button class="menu-btn" data-category="cpu">Процессор</button>
            <button class="menu-btn" data-category="motherboard">Материнская плата</button>
            <button class="menu-btn" data-category="cooler">Кулер</button>
            <button class="menu-btn" data-category="ram">Оперативная память</button>
            <button class="menu-btn" data-category="gpu">Видеокарта</button>
            <button class="menu-btn" data-category="storage">Накопитель</button>
            <button class="menu-btn" data-category="psu">Блок питания</button>
            <button class="menu-btn" data-category="case">Корпус</button>
            <button class="menu-btn" data-category="case_fans">Вентиляторы</button>
        </aside>

        <main id="canvas-container"></main>

        <aside id="sidebar-right">
            <h2>Твоя Сборка</h2>
            <div id="selected-components-list"
                style="display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; max-height: 250px; overflow-y: auto;">
                <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 10px;">Нет выбранных
                    деталей</p>
            </div>

            <h2>ИИ Эксперт</h2>
            <div id="ai-status">Выберите компоненты для начала анализа сборки...</div>
            <div id="total-price">Итого: 0 ₽</div>
        </aside>

    </div>

    <div id="modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <h3 id="modal-title">Выберите деталь</h3>

            <div class="filter-bar"
                style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                <input type="text" id="search-input" placeholder="Поиск по названию..."
                    style="flex: 1; min-width: 180px; padding: 10px; background: #0a0b1e; border: 1px solid var(--accent-violet); color: white; border-radius: 6px; outline: none;">

                <select id="sort-select"
                    style="padding: 10px; background: #0a0b1e; border: 1px solid var(--accent-violet); color: white; border-radius: 6px; outline: none; cursor: pointer;">
                    <option value="default">Сортировка по умолчанию</option>
                    <option value="price_asc">Сначала дешевые ↑</option>
                    <option value="price_desc">Сначала дорогие ↓</option>
                </select>

                <div style="display: flex; flex-direction: column; gap: 4px; min-width: 150px;">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">Макс. цена: <b id="price-slider-value"
                            style="color: var(--accent-blue);">300 000 ₽</b></span>
                    <input type="range" id="price-slider" min="1000" max="300000" step="500" value="300000"
                        style="cursor: pointer; accent-color: var(--accent-blue);">
                </div>
            </div>

            <div id="products-list"></div>
        </div>
    </div>


    <script src="bundle.js"></script>
</body>

</html>
